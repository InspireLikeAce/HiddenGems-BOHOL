<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery – HiddenGems Bohol</title>
  <meta name="description" content="Experience Bohol's hidden beauty through our curated photo collection.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div id="pageHeader"></div>

  <div class="container" style="padding-top:2rem;">
    <div class="filters" id="galleryFilters"></div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <div style="padding-bottom:5rem;"></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Full view">
  </div>

  <div id="footer"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = getNavbar('gallery');
    document.getElementById('pageHeader').innerHTML = getPageHeader('Visual Journey', 'Photo Gallery', 'Experience Bohol\'s hidden beauty through our curated photo collection.');
    document.getElementById('footer').innerHTML = getFooter();

    const galleryCats = Object.keys(galleryData);
    let activeGallery = galleryCats[0];

    function renderGalleryFilters() {
      document.getElementById('galleryFilters').innerHTML = galleryCats.map(key =>
        '<button class="filter-btn '+(activeGallery===key?'active':'')+'" onclick="setGallery(\''+key+'\')">'+galleryData[key].title+'</button>'
      ).join('');
    }

    function renderGalleryGrid() {
      document.getElementById('galleryGrid').innerHTML = galleryData[activeGallery].images.map(img =>
        '<div class="gallery-item" onclick="openLightbox(\''+img.src.replace(/'/g,"\\'")+'\')">'
        +'<img src="'+img.src+'" alt="'+img.alt+'" loading="lazy">'
        +'</div>'
      ).join('');
    }

    function setGallery(key) {
      activeGallery = key;
      renderGalleryFilters();
      renderGalleryGrid();
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    renderGalleryFilters();
    renderGalleryGrid();
  </script>
</body>
</html>
