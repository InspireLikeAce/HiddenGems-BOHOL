<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination Detail – HiddenGems Bohol</title>
  <meta name="description" content="Detailed information about a hidden gem in Bohol.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div id="detailContent"></div>
  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = getNavbar('destinations');
    document.getElementById('footer').innerHTML = getFooter();

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const dest = destinations.find(d => d.id === id);

    if (!dest) {
      document.getElementById('detailContent').innerHTML =
        '<div style="padding:8rem 2rem;text-align:center;">'
        +'<h1 style="font-family:var(--font-heading);font-size:2rem;">Destination not found</h1>'
        +'<a href="destinations.html" class="back-link" style="margin-top:1rem;display:inline-block;">← Back to Destinations</a>'
        +'</div>';
    } else {
      const cat = categoryLabels[dest.category];
      document.title = dest.name + ' – HiddenGems Bohol';

      const reminders = dest.travelReminders.map(r => '<li>• '+r+'</li>').join('');

      document.getElementById('detailContent').innerHTML =
        '<section class="detail-hero">'
        +'<img src="'+dest.image+'" alt="'+dest.name+'">'
        +'<div class="overlay"></div>'
        +'<div class="info"><div class="container">'
        +'<span class="tag">'+cat.icon+' '+cat.label.toUpperCase()+'</span>'
        +'<h1>'+dest.name+'</h1>'
        +'<p class="location">📍 '+dest.municipality+', Bohol</p>'
        +'</div></div></section>'

        +'<div class="container" style="padding:3rem 1rem 5rem;">'
        +'<div class="detail-content">'
        +'<a href="destinations.html" class="back-link">← Back to Destinations</a>'

        +'<div style="margin-top:2rem;">'
        +'<h2 class="section-title">About This Place</h2>'
        +'<p class="section-desc" style="max-width:100%;">'+dest.fullDescription+'</p>'
        +'</div>'

        +'<div class="info-grid">'
        +'<div class="info-card"><div class="info-card-header"><span class="info-card-icon">🧭</span><h3>How to Get There</h3></div><p>'+dest.howToGetThere+'</p></div>'
        +'<div class="info-card"><div class="info-card-header"><span class="info-card-icon">💰</span><h3>Estimated Budget</h3></div><p>'+dest.estimatedBudget+'</p></div>'
        +'<div class="info-card"><div class="info-card-header"><span class="info-card-icon">⚠️</span><h3>Travel Reminders</h3></div><ul>'+reminders+'</ul></div>'
        +'<div class="info-card"><div class="info-card-header"><span class="info-card-icon">🌱</span><h3>Sustainability Note</h3></div><p>'+dest.sustainabilityNote+'</p></div>'
        +'</div>'

        

        +'</div></div>';
    }
  </script>
</body>
</html>
